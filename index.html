<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>謎解きページ</title>

  <style>
    body {
      background-color: #111;
      color: white;
      text-align: center;
      font-family: sans-serif;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-left: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
    }
  
  </style>
</head>

<body>
  <h1>一問目</h1>
  <p>『🔵べて』</p>

  <img src="🔵べて.png" style="display:block; margin:auto;" width="300">

  <input type="text" id="answer" placeholder="答えを入力" style="margin-top: 20px;">
  <button onclick="checkAnswer()">決定</button>

  <div id="result"></div>

  <script>
  function checkAnswer() {
    let input = document.getElementById("answer").value;

    // 表記ゆれ対策
    input = input.toLowerCase();        // 大文字→小文字
    input = input.trim();               // 前後の空白削除

    // 正解パターン
    const correctAnswers = ["指紋", "シモン", "しもん"];

    if (correctAnswers.includes(input)) {
      document.getElementById("result").textContent = "正解！";

       window.location.href = "next.html";

    } else {
      document.getElementById("result").textContent = "不正解...";
    }
  }
  </script>
</body>
</html>
